<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Sapatos</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="site-header">
        <!-- logo and navigation -->
        <div class="logo"><!-- logo placeholder --></div>
        <nav><!-- navigation links placeholder --></nav>
    </header>

    <main>
        <!-- seção hero -->
        <section id="hero" class="hero">
            <!-- hero content placeholder -->
        </section>

        <!-- seção de categorias de tênis -->
        <section id="categorias" class="categories">
            <!-- categories content placeholder -->
        </section>

        <!-- grid com produtos em destaque -->
        <section id="destaques" class="featured-products">
            <!-- featured products grid placeholder -->
        </section>
    </main>

    <footer>
        <!-- informações de contatos e links -->
        <div class="contacts"><!-- contacts placeholder --></div>
        <div class="footer-links"><!-- links placeholder --></div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
